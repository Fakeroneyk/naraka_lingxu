game:
  window_title: "Naraka"           # 游戏窗口标题（待确认精确字符串）
  resolution: [1920, 1080]

timing:
  screenshot_interval: 0.2         # 截图/检测间隔
  action_delay: 0.3                # 动作间隔
  portal_search_timeout: 30        # 传送门搜索超时（秒）
  combat_timeout: 180              # 单关战斗超时（秒）
  lock_attempt_interval: 0.5       # 锁敌尝试间隔
  pre_portal_armor_wait: 5.0       # 进传送门前护甲恢复等待时长（秒）

threshold:
  template_match: 0.85             # 模板匹配置信度
  yolo_confidence: 0.6             # YOLO检测置信度
  portal_close_ratio: 0.05         # 传送门bbox占画面比例阈值（靠近判定）

keys:
  move_forward: "w"
  move_back: "s"
  move_left: "a"
  move_right: "d"
  sprint: "shift"
  lock_target: "`"                 # ~ 键（近战武器下锁敌）
  interact: "e"
  f_skill: "f"                     # 火球技能
  melee_weapon: "1"                # 切换双刀
  ranged_weapon: "2"               # 切换火炮
  repair: "r"                      # 修复武器（火炮耐久耗尽时）
  restore_armor: "5"               # 恢复护甲（进传送门前）

spirit_select:
  template_dir: "assets/ui/spirit_templates/"
  # 5选1时最左卡片的点击坐标（窗口相对坐标，用户实测后配置）
  pick5_click: [273, 519]
  # 3选1时最左卡片的点击坐标
  pick3_click: [606, 521]

exploration:
  rotate_step_deg: 45              # 搜敌时每次旋转角度
  rotate_pixel_per_deg: 10         # 每度对应的鼠标像素位移
  walk_duration: 3.0               # 搜敌时向前行走时长（秒）
  max_explore_rounds: 5            # 最大探索轮数后随机游走

combat:
  attack_combo_count: 5            # 近战连击次数
  ranged_burst_count: 3            # 远程火炮射击次数
  sprint_duration: 1.5             # 冲锋持续时长（秒）
  repair_check_interval: 10        # 检测武器耐久间隔（秒）

models:
  # 合并为一个模型文件（4分类: portal_purple=0, portal_gold=1, portal_red=2, capture_zone=3）
  detector: "models/naraka_v1/weights/best.pt"

assets:
  battle_start: "assets/battleStart.png"
  battle_end: "assets/battleEnd.png"
  ice_branch: "assets/ui/ice_branch.png"
  capture_point_ui: "assets/ui/capture_point_ui.png"
  attack_zero: "assets/ui/attack_zero.png"
  suoding: "assets/ui/suoding.png"